<!-- Template: templates/customers/add.html -->


{% extends 'base.html' %}

<!-- Content block inserted by child templates -->
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4><i class="fas fa-user-plus"></i> Add New Customer</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <h5 class="mb-3">Basic Information</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Full Name *</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Email *</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Phone</label>
                            <input type="text" name="phone" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Tenure (months)</label>
                            <input type="number" name="tenure" class="form-control" value="0">
                        </div>
                    </div>
                    
                    <h5 class="mb-3 mt-3">Purchase Behavior</h5>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label>Total Orders</label>
                            <input type="number" name="total_orders" class="form-control" value="0">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Total Spent (₹)</label>
                            <input type="number" step="0.01" name="total_spent" class="form-control" value="0">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Days Since Last Order</label>
                            <input type="number" name="days_since_last_order" class="form-control" value="0">
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Complaint Count</label>
                            <input type="number" name="complaint_count" class="form-control" value="0">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>City Tier (1/2/3)</label>
                            <input type="number" name="city_tier" class="form-control" value="1">
                        </div>
                    </div>
                    
                    <hr>
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Customer</button>
                        <a href="{% url 'customers:customer_list' %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
