<!-- Template: templates/customers/edit.html -->


{% extends 'base.html' %}

<!-- Content block inserted by child templates -->
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-warning">
                <h4><i class="fas fa-edit"></i> Edit Customer: {{ customer.name }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Full Name *</label>
                            <input type="text" name="name" class="form-control" value="{{ customer.name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Email *</label>
                            <input type="email" name="email" class="form-control" value="{{ customer.email }}" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Phone</label>
                            <input type="text" name="phone" class="form-control" value="{{ customer.phone }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Tenure (months)</label>
                            <input type="number" name="tenure" class="form-control" value="{{ customer.tenure }}">
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label>Total Orders</label>
                            <input type="number" name="total_orders" class="form-control" value="{{ customer.total_orders }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Total Spent (₹)</label>
                            <input type="number" step="0.01" name="total_spent" class="form-control" value="{{ customer.total_spent }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Days Since Last Order</label>
                            <input type="number" name="days_since_last_order" class="form-control" value="{{ customer.days_since_last_order }}">
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Complaint Count</label>
                            <input type="number" name="complaint_count" class="form-control" value="{{ customer.complaint_count }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>City Tier</label>
                            <input type="number" name="city_tier" class="form-control" value="{{ customer.city_tier }}">
                        </div>
                    </div>
                    
                    <hr>
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
                        <a href="{% url 'customers:customer_list' %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
